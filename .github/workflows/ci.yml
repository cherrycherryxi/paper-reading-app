name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python and frontend tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Public repository scan
        run: |
          ! rg --hidden -n "log_server|paper_reading_backend|192\\.168\\.|/Users/huangnanqi" \
            app_server.py reading_mcp_server.py mcp_dispatcher.py tool_schema_provider.py \
            README.md CLAUDE.md .gitignore index.html app.js chat.js tests scripts data \
            -g '!*.db' -g '!__pycache__/**'

      - name: Run Python tests
        run: python -m unittest discover -s tests/agent -p '*_test.py'

      - name: Run frontend tests
        run: node --test tests/frontend/*.test.js
