<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="112" fill="#3d4a3f"/>
  <!-- a growing stack of books: 又买了一本书 -->
  <!-- bottom book -->
  <g>
    <rect x="96" y="330" width="320" height="66" rx="16" fill="#b8c69a"/>
    <rect x="96" y="330" width="30" height="66" rx="14" fill="#9fb381"/>
    <rect x="150" y="356" width="180" height="10" rx="5" fill="#7f9b63" opacity="0.6"/>
  </g>
  <!-- middle book, offset -->
  <g transform="translate(28 0)">
    <rect x="96" y="252" width="300" height="66" rx="16" fill="#7f9b63"/>
    <rect x="96" y="252" width="30" height="66" rx="14" fill="#5f7c48"/>
    <rect x="150" y="278" width="170" height="10" rx="5" fill="#e6ecd9" opacity="0.5"/>
  </g>
  <!-- top book, tilted, the newest one -->
  <g transform="rotate(-7 256 190)">
    <rect x="120" y="150" width="272" height="64" rx="16" fill="#f2efe6"/>
    <rect x="120" y="150" width="28" height="64" rx="13" fill="#d9d5c6"/>
    <rect x="172" y="176" width="150" height="10" rx="5" fill="#b8c69a"/>
  </g>
</svg>
