services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: paper-reading-app:latest
    restart: unless-stopped
    # Override DB_PATH and UPLOAD_DIR via env so they point at mounted volumes.
    # app_server.py reads these by env; if not set, defaults to BASE_DIR-relative.
    environment:
      # — Storage paths inside the container, mapped to named volumes below —
      DB_PATH: /app/db/app_state.db
      UPLOAD_DIR: /app/uploads
      # — Required for AI features —
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      # — Cloud OCR for the fast 快速识别 path (OPT-016); without these it
      #   falls back to local Tesseract automatically —
      BAIDU_OCR_API_KEY: ${BAIDU_OCR_API_KEY:-}
      BAIDU_OCR_SECRET_KEY: ${BAIDU_OCR_SECRET_KEY:-}
      FAST_OCR_ENGINE: ${FAST_OCR_ENGINE:-auto}
      # accurate (默认, 含位置, 可清洗排版) | accurate_basic (省额度, 无位置)
      BAIDU_OCR_ENDPOINT: ${BAIDU_OCR_ENDPOINT:-accurate}
      # — Public URL embedded in password-reset emails —
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-https://example.com}
      # — Optional SMTP for transactional email —
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@example.com}
      # — Admin token for /debug/* pages —
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      # — Comma-separated usernames that see operator-only UI (model logs etc.) —
      ADMIN_USERNAMES: ${ADMIN_USERNAMES:-}
      # — Stripe billing (optional) —
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_PLUS: ${STRIPE_PRICE_PLUS:-}
      # — S3-compatible object storage (optional; without these, local disk is used) —
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_PUBLIC_BASE: ${S3_PUBLIC_BASE:-}
      # — Rate-limit overrides (optional) —
      RATE_LIMIT_HOUR: ${RATE_LIMIT_HOUR:-}
      RATE_LIMIT_DAY: ${RATE_LIMIT_DAY:-}
      SESSION_LIFETIME_DAYS: ${SESSION_LIFETIME_DAYS:-90}
    volumes:
      - paper_data:/app/data
      - paper_uploads:/app/uploads
      # SQLite lives under /app at runtime; mount its parent so the .db file
      # survives container restarts.
      - paper_db:/app/db
    networks:
      - paperweb
    # Don't expose 8787 to the host — only Caddy reaches it via internal network
    expose:
      - "8787"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - paperweb

networks:
  paperweb:
    driver: bridge

volumes:
  paper_data:
  paper_uploads:
  paper_db:
  caddy_data:
  caddy_config:
